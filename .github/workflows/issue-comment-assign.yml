name: Issue Assignment Request

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-comment-assign-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  request-assignment:
    if: |
      github.event.issue.pull_request == null &&
      github.event.issue.state == 'open' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Respond to assignment request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = comment.user.login;

            function isAssignmentRequest(text) {
              const normalized = (text || '')
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .trim();

              const requestPatterns = [
                /^-assign$/,
                /^\/assign$/,
                /\bassign me\b/,
                /\bassign it to me\b/,
                /\bassign this issue to me\b/,
                /\bplease assign\b/,
                /\bcan you assign\b/,
                /\bcould you assign\b/,
                /\bkindly assign\b/,
                /\bi want to work on this\b/,
                /\bi would like to work on this\b/,
                /\bi'd like to work on this\b/,
                /\bcan i work on this\b/,
                /\bmay i work on this\b/,
                /\bi am interested in working on this\b/,
                /\bi'm interested in working on this\b/
              ];

              return requestPatterns.some(pattern => pattern.test(normalized));
            }

            if (!isAssignmentRequest(comment.body)) {
              return;
            }

            if ((issue.assignees || []).length > 0) {
              const assigned = issue.assignees.map(assignee => `@${assignee.login}`).join(', ');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `## Assignment Request Noted\n\nHi @${username}, thank you for wanting to help with this issue.\n\nThis issue already has an active assignee, so please do not start work unless a maintainer reassigns it to you.\n\n### Current Assignment\n\n| Item | Status |\n| --- | --- |\n| Assigned contributor | ${assigned} |\n| Your request | Noted for maintainer visibility |\n| Best next step | Pick another open issue or wait for reassignment |\n\nIf progress stalls, maintainers may reopen the assignment queue.\n\nVoiceForge automation`
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `## Assignment Request Received\n\nHi @${username}, thank you for volunteering to work on this issue.\n\nYour request is now visible to the maintainers. A mentor will confirm the issue scope and readiness before assignment.\n\n### Request Status\n\n| Item | Status |\n| --- | --- |\n| Request | Received |\n| Assignment | Waiting for mentor approval |\n| Before starting | Please wait until you are assigned |\n\nYou can keep exploring other open issues while this request is reviewed.\n\nVoiceForge automation`
            });
