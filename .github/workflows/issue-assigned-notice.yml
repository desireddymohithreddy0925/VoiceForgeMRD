name: Issue Assigned Notice

on:
  issues:
    types: [assigned]

permissions:
  issues: write

concurrency:
  group: issue-assigned-notice-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  notify:
    if: github.event.issue.pull_request == null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Notify assigned contributor
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const assignee = context.payload.assignee;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            if (!assignee || assignee.type === 'Bot') return;
            if ((issue.labels || []).some(label => label.name.toLowerCase() === 'go ahead')) return;

            const marker = `<!-- voiceforge-issue-assigned-${assignee.login} -->`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            const body =
              `${marker}\n` +
              `## You Are Assigned\n\n` +
              `Hi @${assignee.login}, this issue has been assigned to you by the maintainer team.\n\n` +
              `Thanks for picking this up. Keep the work focused on the approved issue scope, then open a PR when your solution is ready.\n\n` +
              `### Start-Work Checklist\n\n` +
              `| Step | Guidance |\n` +
              `| --- | --- |\n` +
              `| Work scope | Stay aligned with this issue description and maintainer comments. |\n` +
              `| Pull request | Use the matching program PR template. |\n` +
              `| Issue link | Include \`Closes #${issue_number}\` in the PR body. |\n` +
              `| PR author | Open the PR from the same GitHub account assigned here. |\n` +
              `| Review | Maintainers will validate template, issue link, assignment, and code quality. |\n\n` +
              `If you cannot continue, leave a quick comment here so maintainers can reopen the issue for another contributor.\n\n` +
              `VoiceForge automation`;

            try {
              if (existing) {
                if (existing.body.trim() === body.trim()) return;
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Could not write assignment notice: ${error.message}`);
                return;
              }
              throw error;
            }
